name: キャンセル監視

on:
  schedule:
    # 6時間ごとに起動（日本時間 6:00/12:00/18:00/0:00）
    # ジョブ内部で3分おきにループするため、cronの精度は問題なし
    - cron: '0 21 * * *'   # JST 6:00
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '0 9 * * *'    # JST 18:00
    - cron: '0 15 * * *'   # JST 0:00
  workflow_dispatch:        # 手動実行用

permissions:
  contents: write   # 通知済み枠ファイルをリポジトリにコミットするため

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 最大5時間50分

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 空き確認ループ（3分おき・最大5時間45分）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          END=$((SECONDS + 345 * 60))   # 5時間45分後まで
          while [ $SECONDS -lt $END ]; do
            python monitor.py
            # 次のチェックまで180秒（3分）待つ（残り時間が少なければ終了）
            REMAINING=$((END - SECONDS))
            if [ $REMAINING -gt 180 ]; then
              sleep 180
            else
              break
            fi
          done
          echo "ループ終了 - 次の起動まで待機"
