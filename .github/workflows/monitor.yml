name: キャンセル監視

on:
  schedule:
    # 6時間ごとに起動（日本時間 6:00/12:00/18:00/0:00）
    # ジョブ内部で3分おきにループするため、cronの精度は問題なし
    - cron: '0 21 * * *'   # JST 6:00
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '0 9 * * *'    # JST 18:00
    - cron: '0 15 * * *'   # JST 0:00
  workflow_dispatch:        # 手動実行用

permissions:
  contents: write   # 通知済み枠ファイルをリポジトリにコミットするため
  actions: write    # 予約成功・安全停止時に本ワークフローを無効化するため

concurrency:
  group: kirby-monitor-production
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 最大5時間50分

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 空き確認ループ（2分おき・最大5時間45分）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          KIRBY_AUTO_BOOK_ENABLED: ${{ vars.KIRBY_AUTO_BOOK_ENABLED }}
          KIRBY_NAME_LAST: ${{ secrets.KIRBY_NAME_LAST }}
          KIRBY_NAME_FIRST: ${{ secrets.KIRBY_NAME_FIRST }}
          KIRBY_KANA_LAST: ${{ secrets.KIRBY_KANA_LAST }}
          KIRBY_KANA_FIRST: ${{ secrets.KIRBY_KANA_FIRST }}
          KIRBY_MOBILE: ${{ secrets.KIRBY_MOBILE }}
          KIRBY_MOBILE_FALLBACK: ${{ secrets.KIRBY_MOBILE_FALLBACK }}
          KIRBY_EMAIL: ${{ secrets.KIRBY_EMAIL }}
          KIRBY_PRIVACY_CONSENT: ${{ vars.KIRBY_PRIVACY_CONSENT }}
        run: |
          END=$((SECONDS + 345 * 60))   # 5時間45分後まで
          while [ $SECONDS -lt $END ]; do
            python monitor.py
            # 次のチェックまで120秒（2分）待つ（残り時間が少なければ終了）
            REMAINING=$((END - SECONDS))
            if [ $REMAINING -gt 120 ]; then
              sleep 120
            else
              break
            fi
          done
          echo "ループ終了 - 次の起動まで待機"
