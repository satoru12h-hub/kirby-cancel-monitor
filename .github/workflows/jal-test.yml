name: JAL監視 テスト（手動1回）

on:
  workflow_dispatch:
    inputs:
      send_test_line:
        description: 'テスト用LINEメッセージを1通送る（稼働確認）'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 稼働確認LINE送信（任意）
        if: ${{ inputs.send_test_line }}
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python - <<'PY'
          import os, requests
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}",
                       "Content-Type": "application/json"},
              json={"to": os.environ["LINE_USER_ID"],
                    "messages": [{"type": "text",
                                  "text": "【JAL工場見学 監視】テスト通知です。4名の空き（日本時間のちょうど30日後を除く）が出たらお知らせします。"}]},
          )
          print("test line sent")
          PY

      - name: 監視を1回実行（空き検出ロジックの確認）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python jal_monitor.py
